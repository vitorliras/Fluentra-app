<button
  type="button"
  class="profile-menu__trigger"
  (click)="toggle()"
  [attr.aria-expanded]="open()"
  [attr.aria-label]="session.name() ?? 'U'"
>
  {{ (session.name() ?? 'U').charAt(0) }}
</button>

@if (open()) {
  <div class="profile-menu__dropdown">
    <div class="profile-menu__header">
      <span class="profile-menu__avatar">{{ (session.name() ?? 'U').charAt(0) }}</span>
      <span class="profile-menu__name">{{ session.name() }}</span>
    </div>

    <div class="profile-menu__item profile-menu__item--inert" tabindex="-1" aria-disabled="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7" />
      </svg>
      {{ languageService.t('profileMenu.myProfile') }}
    </div>

    <button type="button" class="profile-menu__item profile-menu__item--action" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <path d="M16 17l5-5-5-5" />
        <path d="M21 12H9" />
      </svg>
      {{ languageService.t('profileMenu.logout') }}
    </button>
  </div>
}
